<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Deluxe Delivery</title>
  </head>
  <body>
    <header>
      <div class="header-logo">
        <img src="icons/logo.svg" alt="Restaurant Icon" />
        <a href="/"> DELUXE DELIVERY </a>
      </div>

      <div class="header-links">
        <span> FOLLOW US </span>
        <a href="#">
          <img src="icons/x.svg" alt="Twitter Icon" />
        </a>
        <a href="#">
          <img src="icons/instagram.svg" alt="Instagram Icon" />
        </a>
        <a href="#">
          <img src="icons/facebook.svg" alt="Facebook Icon" />
        </a>
      </div>
    </header>
    <main>
      <img src="icons/chef.svg" alt="Chef's Icon" />

      <div class="hero-section">
        <h2>Coming Soon!</h2>
        <h1>DINE IN LUXURY, AT HOME</h1>
        <p>
          Be the first to get the app and get the access to hundreds of
          luxurious restaurants from top chefs in your area, ready to deliver to
          your door.
        </p>
        <form>
          <input type="email" placeholder="Enter Your email" />
          <button>GET EARLY ACCESS</button>
        </form>
      </div>
    </main>

    <footer>
      <p>© 2026 Deluxe Delivery. All Rights Reserved.</p>
    </footer>
  </body>
</html>
